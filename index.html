<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ASC 売上記録アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F2F4F7; font-family: 'Helvetica Neue', Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @media print {
      .no-print { display: none !important; }
      body { margin: 0; background: #fff; }
      .print-root { padding: 16px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const RATES = {
  SS: { delivery: 260, pickup: 100 },
  S:  { delivery: 520, pickup: 150 },
  A:  { delivery: 750, pickup: 330 },
  B:  { delivery: 800, pickup: 430 },
  C:  { delivery: 1580, pickup: 540 },
  D:  { delivery: 2600, pickup: 900 },
  E:  { delivery: 3090, pickup: 1550 },
  F:  { delivery: 3280, pickup: 2290 },
  G:  { delivery: 4080, pickup: 2780 },
};
const SIZES = Object.keys(RATES);

const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const monthKey = (s) => s.slice(0, 7);
const fmt = (n) => n.toLocaleString('ja-JP');

const emptyEntry = () => {
  const e = { options: [] };
  SIZES.forEach(s => { e[s] = { delivery: '', pickup: '' }; });
  return e;
};

const calcBaseTotal = (entry) => {
  let t = 0;
  SIZES.forEach(s => {
    t += (parseInt(entry[s]?.delivery) || 0) * RATES[s].delivery;
    t += (parseInt(entry[s]?.pickup)   || 0) * RATES[s].pickup;
  });
  return t;
};
const calcOptionTotal = (entry) =>
  (entry.options || []).reduce((sum, o) => sum + (parseInt(o.amount) || 0), 0);
const calcDayTotal = (entry) => calcBaseTotal(entry) + calcOptionTotal(entry);

// ─── Storage keys ───
const STAFF_KEY   = 'asc_staff_v2';
const RECORDS_KEY = 'asc_records_v2';

const loadStaff = () => {
  try {
    const r = localStorage.getItem(STAFF_KEY);
    return r ? JSON.parse(r) : [{ id: 'staff_1', name: 'スタッフ1' }];
  } catch { return [{ id: 'staff_1', name: 'スタッフ1' }]; }
};
const saveStaff = (staff) => {
  try { localStorage.setItem(STAFF_KEY, JSON.stringify(staff)); } catch {}
};

// records: { staffId: { date: entry } }
const loadRecords = () => {
  try { const r = localStorage.getItem(RECORDS_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; }
};
const saveRecords = (recs) => {
  try { localStorage.setItem(RECORDS_KEY, JSON.stringify(recs)); } catch {}
};

const dateLabel = (d) => {
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}(${'日月火水木金土'[dt.getDay()]})`;
};
const monthLabel = (m) => { const [y, mo] = m.split('-'); return `${y}年${parseInt(mo)}月`; };

// ─── Staff color palette ───
const STAFF_COLORS = [
  '#2563A8', '#16A34A', '#DC2626', '#9333EA', '#D97706',
  '#0891B2', '#DB2777', '#65A30D', '#EA580C', '#7C3AED',
];
const staffColor = (idx) => STAFF_COLORS[idx % STAFF_COLORS.length];

// ─── Staff Manager Modal ───
function StaffModal({ staff, onClose, onSave }) {
  const [list, setList] = useState(staff.map(s => ({ ...s })));
  const [newName, setNewName] = useState('');

  const addStaff = () => {
    const name = newName.trim();
    if (!name) return;
    const id = 'staff_' + Date.now();
    setList(prev => [...prev, { id, name }]);
    setNewName('');
  };

  const removeMember = (id) => {
    if (list.length <= 1) return;
    setList(prev => prev.filter(s => s.id !== id));
  };

  const updateName = (id, name) => {
    setList(prev => prev.map(s => s.id === id ? { ...s, name } : s));
  };

  const handleSave = () => {
    const cleaned = list.filter(s => s.name.trim());
    if (cleaned.length === 0) return;
    onSave(cleaned);
    onClose();
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 100, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
      <div style={{ background: '#fff', width: '100%', maxWidth: 480, borderRadius: '18px 18px 0 0', padding: '20px 16px 32px', maxHeight: '80vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: '#1A3A5C', flex: 1 }}>👥 スタッフ管理</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 22, color: '#888', cursor: 'pointer' }}>✕</button>
        </div>

        {list.map((s, idx) => (
          <div key={s.id} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <div style={{ width: 12, height: 12, borderRadius: '50%', background: staffColor(idx), flexShrink: 0 }} />
            <input
              value={s.name}
              onChange={e => updateName(s.id, e.target.value)}
              style={{ flex: 1, padding: '10px 12px', fontSize: 15, border: '1.5px solid #D0D7E3', borderRadius: 10, outline: 'none', color: '#1A3A5C' }}
            />
            <button
              onClick={() => removeMember(s.id)}
              disabled={list.length <= 1}
              style={{ padding: '8px 10px', borderRadius: 8, border: '1.5px solid #EF4444', background: '#fff', color: list.length <= 1 ? '#ccc' : '#EF4444', fontSize: 14, cursor: list.length <= 1 ? 'not-allowed' : 'pointer', fontWeight: 700 }}>
              🗑️
            </button>
          </div>
        ))}

        <div style={{ display: 'flex', gap: 8, marginTop: 14, marginBottom: 18 }}>
          <input
            value={newName}
            onChange={e => setNewName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addStaff()}
            placeholder="新しいスタッフ名を入力"
            style={{ flex: 1, padding: '10px 12px', fontSize: 15, border: '1.5px solid #D0D7E3', borderRadius: 10, outline: 'none', color: '#1A3A5C' }}
          />
          <button onClick={addStaff} style={{ padding: '10px 16px', borderRadius: 10, border: 'none', background: '#2563A8', color: '#fff', fontSize: 15, fontWeight: 700, cursor: 'pointer' }}>＋ 追加</button>
        </div>

        <button onClick={handleSave} style={{ width: '100%', padding: '14px', borderRadius: 12, border: 'none', background: '#1A3A5C', color: '#fff', fontSize: 16, fontWeight: 700, cursor: 'pointer' }}>
          ✅ 保存して閉じる
        </button>
      </div>
    </div>
  );
}

function App() {
  const [view, setView]               = useState('input');
  const [selectedDate, setSelectedDate] = useState(today());
  const [records, setRecords]         = useState(loadRecords);
  const [staff, setStaff]             = useState(loadStaff);
  const [currentStaffId, setCurrentStaffId] = useState(() => loadStaff()[0]?.id ?? 'staff_1');
  const [entry, setEntry]             = useState(emptyEntry());
  const [saved, setSaved]             = useState(false);
  const [printView, setPrintView]     = useState(false);
  const [showStaffModal, setShowStaffModal] = useState(false);

  // Ensure currentStaffId is valid after staff changes
  useEffect(() => {
    if (!staff.find(s => s.id === currentStaffId)) {
      setCurrentStaffId(staff[0]?.id);
    }
  }, [staff]);

  useEffect(() => {
    const staffRecs = records[currentStaffId] || {};
    const rec = staffRecs[selectedDate];
    if (rec) {
      const copy = JSON.parse(JSON.stringify(rec));
      if (!copy.options) copy.options = [];
      setEntry(copy);
    } else {
      setEntry(emptyEntry());
    }
    setSaved(false);
  }, [selectedDate, records, currentStaffId]);

  const handleChange = (size, type, val) => {
    if (val !== '' && !/^\d+$/.test(val)) return;
    setEntry(prev => ({ ...prev, [size]: { ...prev[size], [type]: val } }));
    setSaved(false);
  };
  const addOption = () => {
    setEntry(prev => ({ ...prev, options: [...(prev.options||[]), { label: '', amount: '' }] }));
    setSaved(false);
  };
  const updateOption = (idx, field, val) => {
    if (field === 'amount' && val !== '' && !/^-?\d+$/.test(val)) return;
    setEntry(prev => {
      const opts = [...(prev.options||[])];
      opts[idx] = { ...opts[idx], [field]: val };
      return { ...prev, options: opts };
    });
    setSaved(false);
  };
  const removeOption = (idx) => {
    setEntry(prev => ({ ...prev, options: (prev.options||[]).filter((_, i) => i !== idx) }));
    setSaved(false);
  };
  const handleSave = () => {
    const newRecs = {
      ...records,
      [currentStaffId]: {
        ...(records[currentStaffId] || {}),
        [selectedDate]: JSON.parse(JSON.stringify(entry)),
      },
    };
    setRecords(newRecs);
    saveRecords(newRecs);
    setSaved(true);
  };
  const handleDelete = () => {
    const staffRecs = records[currentStaffId] || {};
    if (!staffRecs[selectedDate]) return;
    const newStaffRecs = { ...staffRecs };
    delete newStaffRecs[selectedDate];
    const newRecs = { ...records, [currentStaffId]: newStaffRecs };
    setRecords(newRecs);
    saveRecords(newRecs);
    setEntry(emptyEntry());
    setSaved(false);
  };

  const handleSaveStaff = (newStaff) => {
    setStaff(newStaff);
    saveStaff(newStaff);
  };

  const currentStaff = staff.find(s => s.id === currentStaffId) || staff[0];
  const currentStaffIdx = staff.findIndex(s => s.id === currentStaffId);
  const accentColor = staffColor(currentStaffIdx);

  const currentMonth = monthKey(selectedDate);

  // Month data for CURRENT staff
  const staffRecs = records[currentStaffId] || {};
  const monthDays = Object.entries(staffRecs)
    .filter(([d]) => monthKey(d) === currentMonth)
    .sort(([a],[b]) => a.localeCompare(b));
  const monthBaseTotal   = monthDays.reduce((s,[,e]) => s + calcBaseTotal(e), 0);
  const monthOptionTotal = monthDays.reduce((s,[,e]) => s + calcOptionTotal(e), 0);
  const monthTotal       = monthBaseTotal + monthOptionTotal;

  const monthBreakdown = SIZES.map(size => {
    let dc=0, da=0, pc=0, pa=0;
    monthDays.forEach(([,e]) => {
      const d=parseInt(e[size]?.delivery)||0, p=parseInt(e[size]?.pickup)||0;
      dc+=d; da+=d*RATES[size].delivery; pc+=p; pa+=p*RATES[size].pickup;
    });
    return { size, dc, da, pc, pa };
  }).filter(r => r.dc > 0 || r.pc > 0);

  const monthOptions = monthDays.flatMap(([d,e]) =>
    (e.options||[]).filter(o => o.label || o.amount)
      .map(o => ({ date: d, label: o.label, amount: parseInt(o.amount)||0 }))
  );

  // Summary across ALL staff for current month (for summary tab)
  const allStaffMonthSummary = staff.map((s, idx) => {
    const srecs = records[s.id] || {};
    const days = Object.entries(srecs).filter(([d]) => monthKey(d) === currentMonth);
    const base = days.reduce((sum, [,e]) => sum + calcBaseTotal(e), 0);
    const opt  = days.reduce((sum, [,e]) => sum + calcOptionTotal(e), 0);
    return { ...s, idx, base, opt, total: base + opt, dayCount: days.length };
  });
  const grandTotal = allStaffMonthSummary.reduce((s, r) => s + r.total, 0);

  const baseTotal   = calcBaseTotal(entry);
  const optionTotal = calcOptionTotal(entry);
  const dayTotal    = baseTotal + optionTotal;
  const hasDayData  = SIZES.some(s => (parseInt(entry[s]?.delivery)||0)+(parseInt(entry[s]?.pickup)||0)>0)
    || (entry.options||[]).some(o => parseInt(o.amount)||0);

  const inputStyle = {
    width: '100%', padding: '8px 4px', fontSize: 18, textAlign: 'center',
    border: '1.5px solid #D0D7E3', borderRadius: 8, outline: 'none',
    boxSizing: 'border-box', color: '#1A3A5C',
  };

  /* ─── PRINT VIEW ─── */
  if (printView) {
    const [y, m] = currentMonth.split('-');
    const title = `${y}年${parseInt(m)}月　売上明細　${currentStaff?.name || ''}`;
    return (
      <div style={{ background: '#fff', minHeight: '100vh' }}>
        <div className="no-print" style={{
          position: 'sticky', top: 0, zIndex: 10, background: '#1A3A5C', color: '#fff',
          padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <button onClick={() => setPrintView(false)} style={{
            background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff',
            borderRadius: 8, padding: '6px 12px', fontSize: 13, cursor: 'pointer',
          }}>← 戻る</button>
          <span style={{ flex: 1, fontWeight: 700, fontSize: 15 }}>印刷プレビュー</span>
          <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.85)', textAlign: 'right', lineHeight: 1.5 }}>
            🖨️ ブラウザの「印刷」メニューから<br/>PDF保存できます
          </span>
        </div>

        <div className="print-root" style={{ padding: '20px 18px', maxWidth: 680, margin: '0 auto', color: '#111' }}>
          <div style={{ textAlign: 'center', marginBottom: 18 }}>
            <div style={{ fontSize: 11, color: '#666', marginBottom: 4 }}>アートセッティングデリバリー（ASC）</div>
            <div style={{ fontSize: 22, fontWeight: 700, borderBottom: '2px solid #1A3A5C', paddingBottom: 8 }}>{title}</div>
          </div>

          <div style={{ border: '2px solid #1A3A5C', borderRadius: 8, padding: '12px 16px', marginBottom: 18, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#F0F5FF' }}>
            <div>
              <div style={{ fontSize: 11, color: '#555' }}>基本料金　¥{fmt(monthBaseTotal)}</div>
              <div style={{ fontSize: 11, color: '#555' }}>オプション　{monthOptionTotal>=0?'+':''}¥{fmt(monthOptionTotal)}</div>
              <div style={{ fontSize: 11, color: '#555', marginTop: 2 }}>{monthDays.length}日分の記録</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 11, color: '#555', marginBottom: 2 }}>月間合計（税別）</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: '#1A3A5C' }}>¥{fmt(monthTotal)}</div>
            </div>
          </div>

          <div style={{ marginBottom: 18 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: '#1A3A5C', borderBottom: '1.5px solid #1A3A5C', paddingBottom: 4, marginBottom: 6 }}>日別売上</div>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead>
                <tr style={{ background: '#1A3A5C', color: '#fff' }}>
                  <th style={{ padding: '6px 8px', textAlign: 'left' }}>日付</th>
                  <th style={{ padding: '6px 8px', textAlign: 'left' }}>内訳</th>
                  <th style={{ padding: '6px 8px', textAlign: 'right' }}>基本</th>
                  <th style={{ padding: '6px 8px', textAlign: 'right' }}>OP</th>
                  <th style={{ padding: '6px 8px', textAlign: 'right' }}>合計</th>
                </tr>
              </thead>
              <tbody>
                {monthDays.map(([d,e], i) => {
                  const base = calcBaseTotal(e), opt = calcOptionTotal(e);
                  const detail = SIZES.filter(s=>(parseInt(e[s]?.delivery)||0)+(parseInt(e[s]?.pickup)||0)>0)
                    .map(s=>{const dv=parseInt(e[s]?.delivery)||0,pk=parseInt(e[s]?.pickup)||0;return[dv>0&&`${s}配${dv}`,pk>0&&`${s}集${pk}`].filter(Boolean).join(' ');}).join('　');
                  return (
                    <tr key={d} style={{ background: i%2===0?'#fff':'#F8FAFC', borderBottom: '1px solid #E5E7EB' }}>
                      <td style={{ padding: '5px 8px', whiteSpace: 'nowrap' }}>{dateLabel(d)}</td>
                      <td style={{ padding: '5px 8px', color: '#444', fontSize: 11 }}>{detail||'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>¥{fmt(base)}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right', color: opt!==0?'#5B4FCF':'#ccc' }}>{opt!==0?(opt>0?'+':'')+'¥'+fmt(opt):'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right', fontWeight: 600 }}>¥{fmt(base+opt)}</td>
                    </tr>
                  );
                })}
                <tr style={{ background: '#EEF4FF', borderTop: '2px solid #1A3A5C', fontWeight: 700 }}>
                  <td colSpan={2} style={{ padding: '7px 8px' }}>合計</td>
                  <td style={{ padding: '7px 8px', textAlign: 'right' }}>¥{fmt(monthBaseTotal)}</td>
                  <td style={{ padding: '7px 8px', textAlign: 'right', color: '#5B4FCF' }}>{monthOptionTotal!==0?(monthOptionTotal>0?'+':'')+'¥'+fmt(monthOptionTotal):'—'}</td>
                  <td style={{ padding: '7px 8px', textAlign: 'right', fontSize: 14 }}>¥{fmt(monthTotal)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {monthBreakdown.length > 0 && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: '#1A3A5C', borderBottom: '1.5px solid #1A3A5C', paddingBottom: 4, marginBottom: 6 }}>サイズ別集計</div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: '#1A3A5C', color: '#fff' }}>
                    {['サイズ','配達件数','配達金額','集荷件数','集荷金額','小計'].map((h,i) => (
                      <th key={h} style={{ padding: '6px 8px', textAlign: i===0?'left':'right' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {monthBreakdown.map((r,i) => (
                    <tr key={r.size} style={{ background: i%2===0?'#fff':'#F8FAFC', borderBottom: '1px solid #E5E7EB' }}>
                      <td style={{ padding: '5px 8px', fontWeight: 700 }}>{r.size}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>{r.dc>0?r.dc+'件':'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>{r.da>0?'¥'+fmt(r.da):'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>{r.pc>0?r.pc+'件':'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>{r.pa>0?'¥'+fmt(r.pa):'—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right', fontWeight: 600 }}>¥{fmt(r.da+r.pa)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {monthOptions.length > 0 && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: '#5B4FCF', borderBottom: '1.5px solid #5B4FCF', paddingBottom: 4, marginBottom: 6 }}>オプション明細</div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: '#5B4FCF', color: '#fff' }}>
                    {['日付','内容','金額'].map((h,i) => (
                      <th key={h} style={{ padding: '6px 8px', textAlign: i===2?'right':'left' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {monthOptions.map((o,i) => (
                    <tr key={i} style={{ background: i%2===0?'#fff':'#F8FAFC', borderBottom: '1px solid #E5E7EB' }}>
                      <td style={{ padding: '5px 8px', whiteSpace: 'nowrap' }}>{dateLabel(o.date)}</td>
                      <td style={{ padding: '5px 8px' }}>{o.label||'（内容未記入）'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right', color: o.amount<0?'#E05252':'#5B4FCF', fontWeight: 600 }}>{o.amount>=0?'+':''}¥{fmt(o.amount)}</td>
                    </tr>
                  ))}
                  <tr style={{ background: '#F3F0FF', borderTop: '2px solid #5B4FCF', fontWeight: 700 }}>
                    <td colSpan={2} style={{ padding: '7px 8px', color: '#5B4FCF' }}>オプション合計</td>
                    <td style={{ padding: '7px 8px', textAlign: 'right', color: monthOptionTotal<0?'#E05252':'#5B4FCF' }}>{monthOptionTotal>=0?'+':''}¥{fmt(monthOptionTotal)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}

          <div style={{ textAlign: 'right', fontSize: 10, color: '#aaa', marginTop: 24 }}>
            出力日：{new Date().toLocaleDateString('ja-JP')}
          </div>
        </div>
      </div>
    );
  }

  /* ─── MAIN APP ─── */
  return (
    <div style={{ fontFamily: "'Helvetica Neue', Arial, sans-serif", background: '#F2F4F7', minHeight: '100vh', maxWidth: 480, margin: '0 auto', paddingBottom: 80 }}>

      {showStaffModal && (
        <StaffModal staff={staff} onClose={() => setShowStaffModal(false)} onSave={handleSaveStaff} />
      )}

      {/* Header */}
      <div style={{ background: `linear-gradient(135deg, #1A3A5C 0%, ${accentColor} 100%)`, color: '#fff', padding: '16px 16px 10px', position: 'sticky', top: 0, zIndex: 10, boxShadow: '0 2px 8px rgba(0,0,0,0.18)' }}>
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 8 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, opacity: 0.75, letterSpacing: 1 }}>アートセッティングデリバリー（ASC）</div>
            <div style={{ fontSize: 18, fontWeight: 700 }}>売上記録アプリ</div>
          </div>
          <button onClick={() => setShowStaffModal(true)} style={{ background: 'rgba(255,255,255,0.18)', border: 'none', color: '#fff', borderRadius: 8, padding: '6px 10px', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
            👥 スタッフ管理
          </button>
        </div>

        {/* Staff selector */}
        <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 4, marginBottom: 8, scrollbarWidth: 'none' }}>
          {staff.map((s, idx) => (
            <button key={s.id} onClick={() => setCurrentStaffId(s.id)} style={{

                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: '#1A3A5C' }}>{s.name}</div>
                      <div style={{ fontSize: 11, color: '#888' }}>{s.dayCount}日稼働</div>
                    </div>
                    <div style={{ fontWeight: 800, fontSize: 16, color: staffColor(s.idx) }}>¥{fmt(s.total)}</div>
                  </div>
                ))}
            </div>
          )}

          {allStaffMonthSummary.every(s => s.total === 0) && (
            <div style={{ textAlign: 'center', padding: '40px 20px', color: '#AAB0BC' }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>📭</div>
              <div style={{ fontWeight: 600 }}>この月の記録はまだありません</div>
            </div>
          )}
        </div>
      )}

      <div style={{ height: 20 }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
