const { useState, useEffect, useCallback } = React;

// ─── 定数 ───
const DEFAULT_RATES = {
  SS: { delivery: 260,  pickup: 100  },
  S:  { delivery: 520,  pickup: 150  },
  A:  { delivery: 750,  pickup: 330  },
  B:  { delivery: 800,  pickup: 430  },
  C:  { delivery: 1580, pickup: 540  },
  D:  { delivery: 2600, pickup: 900  },
  E:  { delivery: 3090, pickup: 1550 },
  F:  { delivery: 3280, pickup: 2290 },
  G:  { delivery: 4080, pickup: 2780 },
};
const SIZES = Object.keys(DEFAULT_RATES);
const getRates = () => window.__rates || DEFAULT_RATES;
const STAFF_COLORS = [
  '#2563A8','#16A34A','#DC2626','#9333EA','#D97706',
  '#0891B2','#DB2777','#65A30D','#EA580C','#7C3AED',
];

const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const monthKey  = s => s.slice(0, 7);

const calcOptionTotal = e => (e.options||[]).reduce((s,o)=>s+(parseInt(o.amount)||0),0);

// ─── Firebase ヘルパー ───
const getFirebase = () => window.__firebase;

async function loadUserProfile(uid) {
  const { db, doc, getDoc } = getFirebase();
  const snap = await getDoc(doc(db, 'users', uid));
  return snap.exists() ? snap.data() : null;
}

async function loadAllStaff(db, collection, getDocs) {
  const snap = await getDocs(collection(db, 'users'));
  return snap.docs.map(d => ({ uid: d.id, ...d.data() }));
}

async function saveRecord(uid, date, entry) {
  const { db, doc, setDoc } = getFirebase();
  await setDoc(doc(db, 'records', `${uid}_${date}`), { uid, date, entry });
}

async function deleteRecord(uid, date) {
  const { db, doc, deleteDoc } = getFirebase();
  await deleteDoc(doc(db, 'records', `${uid}_${date}`));
}

// ─── 画像圧縮ユーティリティ ───
function compressImage(file, maxPx=1200, quality=0.80) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ─── ログイン・新規登録画面 ───
function LoginScreen() {
  const [mode, setMode]         = useState('login'); // 'login' | 'register'
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [name, setName]         = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [done, setDone]         = useState(false);

  const handleLogin = async () => {
    if (!email || !password) return;
    setLoading(true); setError('');
    try {
      const { auth, signInWithEmailAndPassword } = getFirebase();
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      setError('メールアドレスまたはパスワードが正しくありません');
    }
    setLoading(false);
  };

  const handleResetPassword = async () => {
    if (!email.trim()) { setError('メールアドレスを入力してください'); return; }
    setLoading(true); setError('');
    try {
      const { auth } = getFirebase();
      const { sendPasswordResetEmail } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      await sendPasswordResetEmail(auth, email.trim());
      setMode('resetDone');
    } catch(e) {
      setError('送信に失敗しました。メールアドレスを確認してください');
    }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!email || !password || !name.trim()) { setError('すべての項目を入力してください'); return; }
    if (password.length < 6) { setError('パスワードは6文字以上にしてください'); return; }
    setLoading(true); setError('');
    try {
      // Firebase AuthでユーザーをCreate
      const { auth, db, doc, setDoc } = getFirebase();
      const { createUserWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      // Firestoreにプロフィールを登録（roleはstaffで固定）
      await setDoc(doc(db, 'users', cred.user.uid), {
        name: name.trim(),
        email: email.toLowerCase(),
        role: 'staff',
      });
      setDone(true);
    } catch (e) {
      if (e.code === 'auth/email-already-in-use') {
        setError('このメールアドレスはすでに登録されています');
      } else {
        setError('登録に失敗しました: ' + e.message);
      }
    }
    setLoading(false);
  };

  const switchMode = (m) => { setMode(m); setError(''); setDone(false); };

  if (done) return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1A3A5C 0%,#2563A8 100%)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:20, padding:'32px 24px', width:'100%', maxWidth:380, textAlign:'center' }}>
        <div style={{ fontSize:48, marginBottom:16 }}>✅</div>
        <div style={{ fontSize:20, fontWeight:800, color:'#1A3A5C', marginBottom:8 }}>登録完了！</div>
        <div style={{ fontSize:13, color:'#666', marginBottom:24 }}>アカウントが作成されました。<br/>そのままログインできます。</div>
        <button onClick={()=>switchMode('login')} style={{ width:'100%', padding:'14px', borderRadius:12, border:'none', background:'#1A3A5C', color:'#fff', fontSize:16, fontWeight:700, cursor:'pointer' }}>
          ログイン画面へ
        </button>
      </div>
    </div>
  );

  // パスワードリセットメール送信完了画面
  if (mode === 'resetDone') return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1A3A5C 0%,#2563A8 100%)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:20, padding:'32px 24px', width:'100%', maxWidth:380, textAlign:'center' }}>
        <div style={{ fontSize:48, marginBottom:16 }}>📧</div>
        <div style={{ fontSize:20, fontWeight:800, color:'#1A3A5C', marginBottom:8 }}>メールを送信しました</div>
        <div style={{ fontSize:13, color:'#666', marginBottom:8, lineHeight:1.7 }}>
          <b>{email}</b> 宛に<br/>パスワードリセット用のリンクを送信しました。
        </div>
        <div style={{ fontSize:12, color:'#888', marginBottom:24, lineHeight:1.7 }}>
          メールが届かない場合は迷惑メールフォルダをご確認ください。
        </div>
        <button onClick={()=>switchMode('login')} style={{ width:'100%', padding:'14px', borderRadius:12, border:'none', background:'#1A3A5C', color:'#fff', fontSize:16, fontWeight:700, cursor:'pointer' }}>
          ログイン画面に戻る
        </button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#1A3A5C 0%,#2563A8 100%)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:20, padding:'32px 24px', width:'100%', maxWidth:380, boxShadow:'0 8px 32px rgba(0,0,0,0.18)' }}>
        <div style={{ textAlign:'center', marginBottom:24 }}>
          <div style={{ fontSize:11, color:'#888', letterSpacing:2, marginBottom:6 }}>アートセッティングデリバリー</div>
          <div style={{ fontSize:24, fontWeight:800, color:'#1A3A5C' }}>ASC 売上記録</div>
        </div>

        {/* タブ切り替え */}
        <div style={{ display:'flex', background:'#F2F4F7', borderRadius:10, padding:3, marginBottom:24 }}>
          {[['login','ログイン'],['register','新規登録']].map(([m,label])=>(
            <button key={m} onClick={()=>switchMode(m)} style={{
              flex:1, padding:'8px 0', borderRadius:8, border:'none',
              background: mode===m?'#fff':'transparent',
              color: mode===m?'#1A3A5C':'#888',
              fontWeight: mode===m?700:400, fontSize:13, cursor:'pointer',
              boxShadow: mode===m?'0 1px 4px rgba(0,0,0,0.1)':'none',
            }}>{label}</button>
          ))}
        </div>

        {mode==='register' && (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:12, color:'#555', marginBottom:6, fontWeight:600 }}>表示名（氏名）</div>
            <input type="text" value={name} onChange={e=>setName(e.target.value)}
              placeholder="例：山田 太郎"
              style={{ width:'100%', padding:'12px 14px', fontSize:15, border:'1.5px solid #D0D7E3', borderRadius:10, outline:'none', color:'#1A3A5C' }}
            />
          </div>
        )}

        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:12, color:'#555', marginBottom:6, fontWeight:600 }}>メールアドレス</div>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            placeholder="example@mail.com"
            style={{ width:'100%', padding:'12px 14px', fontSize:15, border:'1.5px solid #D0D7E3', borderRadius:10, outline:'none', color:'#1A3A5C' }}
          />
        </div>

        {mode !== 'reset' && (
          <div style={{ marginBottom: mode==='login' ? 8 : 20 }}>
            <div style={{ fontSize:12, color:'#555', marginBottom:6, fontWeight:600 }}>パスワード{mode==='register'&&<span style={{ color:'#888', fontWeight:400 }}>（6文字以上）</span>}</div>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&(mode==='login'?handleLogin():handleRegister())}
              placeholder="パスワードを入力"
              style={{ width:'100%', padding:'12px 14px', fontSize:15, border:'1.5px solid #D0D7E3', borderRadius:10, outline:'none', color:'#1A3A5C' }}
            />
          </div>
        )}

        {mode === 'login' && (
          <div style={{ textAlign:'right', marginBottom:16 }}>
            <button onClick={()=>switchMode('reset')} style={{ background:'none', border:'none', color:'#2563A8', fontSize:12, cursor:'pointer', textDecoration:'underline' }}>
              パスワードを忘れた方
            </button>
          </div>
        )}

        {mode === 'reset' && (
          <div style={{ marginBottom:16, padding:'12px', background:'#F0F5FF', borderRadius:10, fontSize:12, color:'#555', lineHeight:1.7 }}>
            登録したメールアドレスを入力してください。<br/>パスワードリセット用のリンクをお送りします。
          </div>
        )}

        {error && <div style={{ color:'#EF4444', fontSize:13, marginBottom:14, textAlign:'center' }}>{error}</div>}

        <button onClick={mode==='login'?handleLogin:mode==='register'?handleRegister:handleResetPassword} disabled={loading} style={{
          width:'100%', padding:'14px', borderRadius:12, border:'none',
          background: loading?'#BCC3CF':'#1A3A5C', color:'#fff',
          fontSize:16, fontWeight:700, cursor: loading?'not-allowed':'pointer'
        }}>
          {loading
            ? (mode==='login'?'ログイン中...':mode==='register'?'登録中...':'送信中...')
            : (mode==='login'?'ログイン':mode==='register'?'アカウントを作成':'リセットメールを送信')}
        </button>

        {mode === 'reset' && (
          <button onClick={()=>switchMode('login')} style={{ width:'100%', marginTop:10, padding:'12px', borderRadius:12, border:'1.5px solid #D0D7E3', background:'#fff', color:'#555', fontSize:14, fontWeight:600, cursor:'pointer' }}>
            ログインに戻る
          </button>
        )}

        {mode==='register' && (
          <div style={{ marginTop:14, padding:'12px', background:'#F0FDF4', borderRadius:10, fontSize:12, color:'#555', lineHeight:1.7 }}>
            ※ 新規登録はスタッフ権限で作成されます。<br/>管理者権限が必要な場合は管理者に連絡してください。
          </div>
        )}
      </div>
    </div>
  );
}


// ─── 単価管理モーダル（管理者用） ───
function RatesModal({ onClose, currentRates, onSaved }) {
  const [rates, setRates] = useState(JSON.parse(JSON.stringify(currentRates)));
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');

  const handleChange = (size, type, val) => {
    if (val !== '' && !/^\d+$/.test(val)) return;
    setRates(prev => ({ ...prev, [size]: { ...prev[size], [type]: val === '' ? '' : parseInt(val) } }));
  };

  const handleSave = async () => {
    // バリデーション
    for (const size of SIZES) {
      if (!rates[size].delivery || !rates[size].pickup) {
        setMsg('すべての単価を入力してください'); return;
      }
    }
    setSaving(true); setMsg('');
    try {
      const { db, doc, setDoc } = getFirebase();
      const saveData = {};
      SIZES.forEach(s => { saveData[s] = { delivery: parseInt(rates[s].delivery), pickup: parseInt(rates[s].pickup) }; });
      await setDoc(doc(db, 'settings', 'rates'), saveData);
      window.__rates = saveData;
      onSaved(saveData);
      setMsg('✅ 保存しました');
      setTimeout(() => onClose(), 800);
    } catch(e) {
      setMsg('保存に失敗しました: ' + e.message);
    }
    setSaving(false);
  };

  const handleReset = () => {
    if (!window.confirm('単価をデフォルト値に戻しますか？')) return;
    setRates(JSON.parse(JSON.stringify(DEFAULT_RATES)));
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:100, display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ background:'#fff', width:'100%', maxWidth:480, borderRadius:'18px 18px 0 0', padding:'20px 16px 32px', maxHeight:'90vh', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:16 }}>
          <span style={{ fontSize:18, fontWeight:700, color:'#1A3A5C', flex:1 }}>💴 単価管理</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, color:'#888', cursor:'pointer' }}>✕</button>
        </div>

        <div style={{ background:'#FFF7ED', borderRadius:10, padding:'10px 12px', marginBottom:16, fontSize:12, color:'#C2410C' }}>
          ⚠️ 単価を変更すると過去の記録の金額表示にも影響します。
        </div>

        {/* 単価テーブル */}
        <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', border:'1px solid #E5E7EB', marginBottom:14 }}>
          <div style={{ display:'grid', gridTemplateColumns:'52px 1fr 1fr', background:'#1A3A5C', color:'#fff', padding:'8px 10px', fontSize:12, fontWeight:600, gap:6, textAlign:'center' }}>
            <div>サイズ</div>
            <div>配達単価（¥）</div>
            <div>集荷単価（¥）</div>
          </div>
          {SIZES.map((size, i) => (
            <div key={size} style={{ display:'grid', gridTemplateColumns:'52px 1fr 1fr', alignItems:'center', gap:6, padding:'8px 10px', background:i%2===0?'#fff':'#F8FAFC', borderBottom:'1px solid #EEF1F5' }}>
              <div style={{ fontWeight:700, fontSize:16, color:'#1A3A5C', textAlign:'center' }}>{size}</div>
              <input type="number" inputMode="numeric" min="0" value={rates[size]?.delivery ?? ''}
                onChange={e => handleChange(size, 'delivery', e.target.value)}
                style={{ width:'100%', padding:'8px 6px', fontSize:15, textAlign:'center', border:'1.5px solid #D0D7E3', borderRadius:8, outline:'none', color:'#2563A8', fontWeight:600, background:'#F5F8FF' }}
              />
              <input type="number" inputMode="numeric" min="0" value={rates[size]?.pickup ?? ''}
                onChange={e => handleChange(size, 'pickup', e.target.value)}
                style={{ width:'100%', padding:'8px 6px', fontSize:15, textAlign:'center', border:'1.5px solid #D0D7E3', borderRadius:8, outline:'none', color:'#E07B39', fontWeight:600, background:'#FFF8F5' }}
              />
            </div>
          ))}
        </div>

        {msg && <div style={{ padding:'10px 12px', borderRadius:8, marginBottom:12, fontSize:13, background: msg.startsWith('✅')?'#F0FDF4':'#FEF2F2', color: msg.startsWith('✅')?'#15803D':'#DC2626' }}>{msg}</div>}

        <div style={{ display:'flex', gap:10 }}>
          <button onClick={handleReset} style={{ padding:'12px 16px', borderRadius:12, border:'1.5px solid #D0D7E3', background:'#fff', color:'#555', fontSize:13, fontWeight:600, cursor:'pointer' }}>
            🔄 デフォルトに戻す
          </button>
          <button onClick={handleSave} disabled={saving} style={{ flex:1, padding:'14px', borderRadius:12, border:'none', background: saving?'#BCC3CF':'#1A3A5C', color:'#fff', fontSize:15, fontWeight:700, cursor: saving?'not-allowed':'pointer' }}>
            {saving ? '保存中...' : '💾 保存する'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── アカウント設定モーダル ───
function AccountModal({ onClose, authUser, userProfile, onDeleteAccount }) {
  const [tab, setTab]             = useState('password'); // 'password' | 'delete'
  const [currentPass, setCurrentPass] = useState('');
  const [newPass, setNewPass]     = useState('');
  const [confirmPass, setConfirmPass] = useState('');
  const [deletePass, setDeletePass] = useState('');
  const [msg, setMsg]             = useState('');
  const [msgType, setMsgType]     = useState('error');
  const [loading, setLoading]     = useState(false);

  const showMsg = (text, type='error') => { setMsg(text); setMsgType(type); };

  const handleChangePassword = async () => {
    if (!currentPass || !newPass || !confirmPass) { showMsg('すべて入力してください'); return; }
    if (newPass.length < 6) { showMsg('新しいパスワードは6文字以上にしてください'); return; }
    if (newPass !== confirmPass) { showMsg('新しいパスワードが一致しません'); return; }
    setLoading(true); setMsg('');
    try {
      const { auth } = getFirebase();
      const { EmailAuthProvider, reauthenticateWithCredential, updatePassword } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const cred = EmailAuthProvider.credential(authUser.email, currentPass);
      await reauthenticateWithCredential(authUser, cred);
      await updatePassword(authUser, newPass);
      showMsg('✅ パスワードを変更しました', 'success');
      setCurrentPass(''); setNewPass(''); setConfirmPass('');
    } catch(e) {
      if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
        showMsg('現在のパスワードが正しくありません');
      } else {
        showMsg('エラー: ' + e.message);
      }
    }
    setLoading(false);
  };

  const handleDeleteAccount = async () => {
    if (!deletePass) { showMsg('パスワードを入力してください'); return; }
    if (!window.confirm('本当にアカウントを削除しますか？\nこの操作は取り消せません。')) return;
    setLoading(true); setMsg('');
    try {
      const { auth, db, doc, deleteDoc, collection, getDocs } = getFirebase();
      const { EmailAuthProvider, reauthenticateWithCredential, deleteUser } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      // 再認証
      const cred = EmailAuthProvider.credential(authUser.email, deletePass);
      await reauthenticateWithCredential(authUser, cred);
      // Firestoreのプロフィール削除
      await deleteDoc(doc(db, 'users', authUser.uid));
      // Firestoreのレコード削除
      const snap = await getDocs(collection(db, 'records'));
      for (const d of snap.docs) {
        if (d.data().uid === authUser.uid) await deleteDoc(doc(db, 'records', d.id));
      }
      // Authアカウント削除
      await deleteUser(authUser);
      onDeleteAccount();
    } catch(e) {
      if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
        showMsg('パスワードが正しくありません');
      } else {
        showMsg('エラー: ' + e.message);
      }
    }
    setLoading(false);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:100, display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ background:'#fff', width:'100%', maxWidth:480, borderRadius:'18px 18px 0 0', padding:'20px 16px 32px', maxHeight:'85vh', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:16 }}>
          <span style={{ fontSize:18, fontWeight:700, color:'#1A3A5C', flex:1 }}>⚙️ アカウント設定</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, color:'#888', cursor:'pointer' }}>✕</button>
        </div>

        <div style={{ fontSize:13, color:'#666', marginBottom:16, padding:'8px 12px', background:'#F8FAFC', borderRadius:8 }}>
          {userProfile?.name}　<span style={{ color:'#888' }}>{authUser.email}</span>
        </div>

        {/* タブ */}
        <div style={{ display:'flex', background:'#F2F4F7', borderRadius:10, padding:3, marginBottom:20 }}>
          {[['password','🔑 パスワード変更'],['delete','🗑️ 退会']].map(([t,label])=>(
            <button key={t} onClick={()=>{setTab(t);setMsg('');}} style={{
              flex:1, padding:'8px 0', borderRadius:8, border:'none',
              background: tab===t?'#fff':'transparent',
              color: tab===t?(t==='delete'?'#EF4444':'#1A3A5C'):'#888',
              fontWeight: tab===t?700:400, fontSize:12, cursor:'pointer',
              boxShadow: tab===t?'0 1px 4px rgba(0,0,0,0.1)':'none',
            }}>{label}</button>
          ))}
        </div>

        {/* パスワード変更 */}
        {tab==='password' && (
          <div>
            {[['現在のパスワード', currentPass, setCurrentPass], ['新しいパスワード（6文字以上）', newPass, setNewPass], ['新しいパスワード（確認）', confirmPass, setConfirmPass]].map(([label, val, setter])=>(
              <div key={label} style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, color:'#555', marginBottom:6, fontWeight:600 }}>{label}</div>
                <input type="password" value={val} onChange={e=>setter(e.target.value)}
                  placeholder="入力してください"
                  style={{ width:'100%', padding:'12px 14px', fontSize:15, border:'1.5px solid #D0D7E3', borderRadius:10, outline:'none', color:'#1A3A5C' }}
                />
              </div>
            ))}
            {msg && <div style={{ padding:'10px 12px', borderRadius:8, marginBottom:14, fontSize:13, background: msgType==='success'?'#F0FDF4':'#FEF2F2', color: msgType==='success'?'#15803D':'#DC2626' }}>{msg}</div>}
            <button onClick={handleChangePassword} disabled={loading} style={{ width:'100%', padding:'14px', borderRadius:12, border:'none', background: loading?'#BCC3CF':'#1A3A5C', color:'#fff', fontSize:15, fontWeight:700, cursor: loading?'not-allowed':'pointer' }}>
              {loading ? '変更中...' : 'パスワードを変更する'}
            </button>

        {/* 退会 */}
        {tab==='delete' && (
          <div>
            <div style={{ padding:'14px', background:'#FEF2F2', borderRadius:10, marginBottom:16, fontSize:13, color:'#DC2626', lineHeight:1.7 }}>
              ⚠️ <b>退会すると以下が削除されます：</b><br/>

              この操作は取り消せません。
            </div>
            <div style={{ marginBottom:14 }}>

// ─── スタッフ管理モーダル（管理者用） ───
function StaffModal({ onClose, currentUid }) {
  const [staffList, setStaffList] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [msg, setMsg]             = useState('');
  const [msgType, setMsgType]     = useState('error');
  const [updatingUid, setUpdatingUid] = useState(null);

  const reload = () => {
    const { db, collection, getDocs } = getFirebase();
    loadAllStaff(db, collection, getDocs).then(list => {
      setStaffList(list);
      setLoading(false);
    });
  };

  useEffect(() => { reload(); }, []);

  const handleRoleChange = async (uid, newRole) => {
    if (uid === currentUid) {
      setMsg('自分自身の権限は変更できません'); setMsgType('error'); return;
    }
    if (!window.confirm(`この操作で権限を「${newRole === 'admin' ? '管理者' : 'スタッフ'}」に変更します。よろしいですか？`)) return;
    setUpdatingUid(uid); setMsg('');
    try {
      const { db, doc, setDoc } = getFirebase();
      const target = staffList.find(s => s.uid === uid);
      await setDoc(doc(db, 'users', uid), { ...target, role: newRole });
      setMsg('✅ 権限を変更しました'); setMsgType('success');
      reload();
    } catch(e) {
      setMsg('エラー: ' + e.message); setMsgType('error');
    }
    setUpdatingUid(null);
  };

  const handleForceDelete = async (uid, name) => {
    if (uid === currentUid) {
      setMsg('自分自身は削除できません'); setMsgType('error'); return;
    }
    if (!window.confirm(`「${name}」のアカウントを強制退会させますか？\n\n・プロフィール情報を削除\n・売上データをすべて削除\n\nこの操作は取り消せません。`)) return;
    setUpdatingUid(uid); setMsg('');
    try {
      const { db, doc, deleteDoc, collection, getDocs } = getFirebase();
      // Firestoreのプロフィール削除
      await deleteDoc(doc(db, 'users', uid));
      // Firestoreの売上レコード削除
      const snap = await getDocs(collection(db, 'records'));
      for (const d of snap.docs) {
        if (d.data().uid === uid) await deleteDoc(doc(db, 'records', d.id));
      }
      setMsg('✅ アカウントを削除しました。Firebaseコンソールから認証アカウントも削除してください。');
      setMsgType('success');
      reload();
    } catch(e) {
      setMsg('エラー: ' + e.message); setMsgType('error');
    }
    setUpdatingUid(null);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:100, display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ background:'#fff', width:'100%', maxWidth:480, borderRadius:'18px 18px 0 0', padding:'20px 16px 32px', maxHeight:'85vh', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:16 }}>
          <span style={{ fontSize:18, fontWeight:700, color:'#1A3A5C', flex:1 }}>👥 スタッフ管理</span>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, color:'#888', cursor:'pointer' }}>✕</button>
        </div>

        <div style={{ fontSize:12, color:'#666', marginBottom:12, lineHeight:1.7 }}>
          権限バッジをタップして管理者↔スタッフを切り替えられます。<br/>
          🗑️ボタンで強制退会（データ削除）できます。
        </div>

        {loading ? (
          <div style={{ textAlign:'center', padding:20 }}><div className="spinner" style={{ margin:'0 auto' }}/></div>
        ) : (
          staffList.map((s, i) => (
            <div key={s.uid} style={{ display:'flex', alignItems:'center', gap:10, padding:'12px', background:i%2?'#F8FAFC':'#fff', borderRadius:10, marginBottom:6, border:'1px solid #EEF1F5' }}>
              <div style={{ width:10, height:10, borderRadius:'50%', background:staffColor(i), flexShrink:0 }}/>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:14, color:'#1A3A5C', display:'flex', alignItems:'center', gap:6 }}>
                  {s.name}
                  {s.uid === currentUid && <span style={{ fontSize:10, color:'#888', fontWeight:400 }}>（自分）</span>}
                </div>
                <div style={{ fontSize:11, color:'#888' }}>{s.email}</div>
              </div>
              {/* 権限切り替え＋削除ボタン */}
              {updatingUid === s.uid ? (
                <span style={{ fontSize:11, color:'#888' }}>更新中...</span>
              ) : s.uid === currentUid ? (
                <span style={{ fontSize:11, padding:'4px 10px', borderRadius:6, background:'#DBEAFE', color:'#1D4ED8', fontWeight:600 }}>
                  👑 管理者
                </span>
              ) : (
                <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                  <button
                    onClick={() => handleRoleChange(s.uid, s.role === 'admin' ? 'staff' : 'admin')}
                    style={{
                      fontSize:11, padding:'4px 10px', borderRadius:6, fontWeight:600, cursor:'pointer', border:'none',
                      background: s.role === 'admin' ? '#DBEAFE' : '#F0FDF4',
                      color: s.role === 'admin' ? '#1D4ED8' : '#15803D',
                    }}>
                    {s.role === 'admin' ? '👑 管理者' : '👤 スタッフ'}
                  </button>
                  <button
                    onClick={() => handleForceDelete(s.uid, s.name)}
                    style={{ fontSize:13, padding:'4px 8px', borderRadius:6, border:'1.5px solid #FCA5A5', background:'#FFF', color:'#EF4444', cursor:'pointer', fontWeight:700 }}
                    title="強制退会">
                    🗑️
                  </button>
                </div>
              )}
            </div>
          ))
        )}

        {msg && (
          <div style={{ marginTop:12, padding:'10px 12px', borderRadius:8, fontSize:13, background: msgType==='success'?'#F0FDF4':'#FEF2F2', color: msgType==='success'?'#15803D':'#DC2626' }}>
            {msg}
          </div>
        )}

        <button onClick={onClose} style={{ width:'100%', marginTop:16, padding:14, borderRadius:12, border:'none', background:'#1A3A5C', color:'#fff', fontSize:15, fontWeight:700, cursor:'pointer' }}>
          閉じる
        </button>
      </div>
    </div>
  );
}

// ─── メインアプリ ───
function App() {
  const [authUser, setAuthUser]           = useState(undefined); // undefined=初期化中
  const [userProfile, setUserProfile]     = useState(null);
  const [view, setView]                   = useState('input');
  const [selectedDate, setSelectedDate]   = useState(today());
  const [records, setRecords]             = useState({});  // { uid: { date: entry } }
  const [allStaff, setAllStaff]           = useState([]);
  const [currentStaffId, setCurrentStaffId] = useState(null);
  const [entry, setEntry]                 = useState(emptyEntry());
  const [saved, setSaved]                 = useState(false);
  const [saving, setSaving]               = useState(false);
  const [imageData, setImageData]         = useState(null);  // 現在表示中の画像base64
  const [imageUploading, setImageUploading] = useState(false);
  const [printView, setPrintView]         = useState(false);
  const [showStaffModal, setShowStaffModal]   = useState(false);
  const [showAccountModal, setShowAccountModal] = useState(false);
  const [showRatesModal, setShowRatesModal]     = useState(false);
  const [currentRates, setCurrentRates]         = useState(DEFAULT_RATES);
  const [dataLoading, setDataLoading]           = useState(true);

  const isAdmin = userProfile?.role === 'admin';

  // 認証状態監視
  useEffect(() => {
    const interval = setInterval(() => {
      if (!window.__firebase) return;
      clearInterval(interval);
      const { auth, onAuthStateChanged, db, doc, getDoc } = window.__firebase;
      // 単価をFirestoreから読み込む
      getDoc(doc(db, 'settings', 'rates')).then(snap => {
        if (snap.exists()) {
          window.__rates = snap.data();
          setCurrentRates(snap.data());
        }
      });
      onAuthStateChanged(auth, async user => {
        setAuthUser(user);
        if (user) {
          const profile = await loadUserProfile(user.uid);
          setUserProfile(profile);
        } else {
          setUserProfile(null);
        }
      });
    }, 300);
    return () => clearInterval(interval);
  }, []);

  // ログイン後データ読み込み
  useEffect(() => {
    if (!authUser || !userProfile) return;
    setDataLoading(true);
    const { db, collection, onSnapshot } = window.__firebase;

    if (isAdmin) {
      // 管理者：全スタッフ情報を取得
      loadAllStaff(db, collection, window.__firebase.getDocs).then(list => {
        setAllStaff(list);
        if (!currentStaffId) setCurrentStaffId(authUser.uid);
      });
      // 全レコードをリアルタイム監視
      const unsub = onSnapshot(collection(db, 'records'), snap => {
        const recs = {};
        snap.docs.forEach(d => {
          const { uid, date, entry } = d.data();
          if (!recs[uid]) recs[uid] = {};
          recs[uid][date] = entry;
        });
        setRecords(recs);
        setDataLoading(false);
      });
      return () => unsub();
    } else {
      // 一般スタッフ：自分の情報のみ
      setAllStaff([{ uid: authUser.uid, ...userProfile }]);
      setCurrentStaffId(authUser.uid);
      const unsub = onSnapshot(
        window.__firebase.query(collection(db, 'records')),
        snap => {
          const recs = {};
          snap.docs.forEach(d => {
            const { uid, date, entry } = d.data();
            if (uid === authUser.uid) {
              if (!recs[uid]) recs[uid] = {};
              recs[uid][date] = entry;
            }
          });
          setRecords(recs);
          setDataLoading(false);
        }
      );
      return () => unsub();
    }
  }, [authUser, userProfile]);

  // 日付・スタッフ切り替え時にエントリ更新
  useEffect(() => {
    const rec = records[currentStaffId]?.[selectedDate];
    if (rec) {
      const copy = JSON.parse(JSON.stringify(rec));
      if (!copy.options) copy.options = [];
      setEntry(copy);
      setImageData(copy.image || null);
    } else {
      setEntry(emptyEntry());
      setImageData(null);
    }
    setSaved(false);
  }, [selectedDate, records, currentStaffId]);

  const handleChange = (size, type, val) => {
    if (val !== '' && !/^\d+$/.test(val)) return;
    setEntry(prev => ({ ...prev, [size]: { ...prev[size], [type]: val } }));
    setSaved(false);
  };
  const addOption    = () => { setEntry(prev => ({ ...prev, options: [...(prev.options||[]), { label:'', amount:'' }] })); setSaved(false); };
  const updateOption = (idx, field, val) => {
    if (field==='amount' && val!=='' && !/^-?\d+$/.test(val)) return;
    setEntry(prev => { const opts=[...(prev.options||[])]; opts[idx]={...opts[idx],[field]:val}; return {...prev,options:opts}; });
    setSaved(false);
  };
  const removeOption = idx => { setEntry(prev => ({ ...prev, options:(prev.options||[]).filter((_,i)=>i!==idx) })); setSaved(false); };

  const handleSave = async () => {
    setSaving(true);
    try {
      const entryToSave = JSON.parse(JSON.stringify(entry));
      if (imageData) entryToSave.image = imageData;
      await saveRecord(currentStaffId, selectedDate, entryToSave);
      setSaved(true);
    } catch(e) {
      alert('保存に失敗しました: ' + e.message);
    }
    setSaving(false);
  };

  const handleImageSelect = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImageUploading(true);
    try {
      const compressed = await compressImage(file);
      setImageData(compressed);
      setSaved(false);
    } catch(err) {
      alert('画像の読み込みに失敗しました');
    }
    setImageUploading(false);
    e.target.value = '';
  };

  const handleImageDelete = () => {
    if (!window.confirm('画像を削除しますか？')) return;
    setImageData(null);
    setSaved(false);
  };

  const handleDelete = async () => {
    if (!records[currentStaffId]?.[selectedDate]) return;
    setSaving(true);
    try {
      await deleteRecord(currentStaffId, selectedDate);
      setEntry(emptyEntry());
      setSaved(false);
    } catch(e) {
      alert('削除に失敗しました: ' + e.message);
    }
    setSaving(false);
  };

  const handleLogout = async () => {
    const { auth, signOut } = window.__firebase;
    await signOut(auth);
  };

  // ─── ローディング ───
  if (authUser === undefined) {
    return <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#1A3A5C' }}>
      <div className="spinner"/>
    </div>;
  }

  // ─── 未ログイン ───
  if (!authUser) return <LoginScreen />;

  // ─── プロフィール未設定 ───
  if (!userProfile) {
    return <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F2F4F7', padding:20 }}>
      <div style={{ background:'#fff', borderRadius:16, padding:24, maxWidth:360, textAlign:'center' }}>
        <div style={{ fontSize:32, marginBottom:12 }}>⚙️</div>
        <div style={{ fontWeight:700, color:'#1A3A5C', marginBottom:8 }}>プロフィール未設定</div>
        <div style={{ fontSize:13, color:'#666', marginBottom:16 }}>管理者にFirestoreへのユーザー登録を依頼してください。</div>
        <button onClick={handleLogout} style={{ padding:'10px 24px', borderRadius:10, border:'none', background:'#EF4444', color:'#fff', fontWeight:700, cursor:'pointer' }}>ログアウト</button>
      </div>
    </div>;
  }

  const currentStaffObj  = allStaff.find(s => s.uid === currentStaffId) || allStaff[0];
  const currentStaffIdx  = allStaff.findIndex(s => s.uid === currentStaffId);
  const accentColor      = staffColor(currentStaffIdx < 0 ? 0 : currentStaffIdx);
  const currentMonth     = monthKey(selectedDate);

  const staffRecs   = records[currentStaffId] || {};
  const monthDays   = Object.entries(staffRecs).filter(([d])=>monthKey(d)===currentMonth).sort(([a],[b])=>a.localeCompare(b));
  const monthBaseTotal   = monthDays.reduce((s,[,e])=>s+calcBaseTotal(e),0);
  const monthOptionTotal = monthDays.reduce((s,[,e])=>s+calcOptionTotal(e),0);
  const monthTotal       = monthBaseTotal + monthOptionTotal;

  const monthBreakdown = SIZES.map(size => {
    let dc=0,da=0,pc=0,pa=0;
    const R=getRates(); monthDays.forEach(([,e])=>{const d=parseInt(e[size]?.delivery)||0,p=parseInt(e[size]?.pickup)||0;dc+=d;da+=d*R[size].delivery;pc+=p;pa+=p*R[size].pickup;});
    return {size,dc,da,pc,pa};
  }).filter(r=>r.dc>0||r.pc>0);

  const monthOptions = monthDays.flatMap(([d,e])=>(e.options||[]).filter(o=>o.label||o.amount).map(o=>({date:d,label:o.label,amount:parseInt(o.amount)||0})));

  const allStaffMonthSummary = allStaff.map((s,idx)=>{
    const srecs=records[s.uid]||{};
    const days=Object.entries(srecs).filter(([d])=>monthKey(d)===currentMonth);
    const base=days.reduce((sum,[,e])=>sum+calcBaseTotal(e),0);
    const opt=days.reduce((sum,[,e])=>sum+calcOptionTotal(e),0);
    return {...s,idx,base,opt,total:base+opt,dayCount:days.length};
  });
  const grandTotal = allStaffMonthSummary.reduce((s,r)=>s+r.total,0);

  const baseTotal   = calcBaseTotal(entry);
  const optionTotal = calcOptionTotal(entry);
  const dayTotal    = baseTotal + optionTotal;
  const hasDayData  = SIZES.some(s=>(parseInt(entry[s]?.delivery)||0)+(parseInt(entry[s]?.pickup)||0)>0)||(entry.options||[]).some(o=>parseInt(o.amount)||0);

  const inputStyle = { width:'100%', padding:'8px 4px', fontSize:18, textAlign:'center', border:'1.5px solid #D0D7E3', borderRadius:8, outline:'none', boxSizing:'border-box', color:'#1A3A5C' };

  // ─── 印刷ビュー ───
  if (printView) return <PrintView
    onBack={()=>setPrintView(false)}
    staffName={currentStaffObj?.name||''}
    currentMonth={currentMonth}
    monthDays={monthDays}
    monthBaseTotal={monthBaseTotal}
    monthOptionTotal={monthOptionTotal}
    monthTotal={monthTotal}
    monthBreakdown={monthBreakdown}
    monthOptions={monthOptions}
  />;

  // ─── タブ定義（権限による切り替え） ───
  const tabs = isAdmin
    ? [['input','📋 日次入力'],['month','📊 月次集計'],['all','🏆 全員集計']]
    : [['input','📋 日次入力'],['month','📊 月次集計']];

  return (
    <div style={{ fontFamily:"'Helvetica Neue',Arial,sans-serif", background:'#F2F4F7', minHeight:'100vh', maxWidth:480, margin:'0 auto', paddingBottom:80 }}>

      {showStaffModal && isAdmin && <StaffModal onClose={()=>setShowStaffModal(false)} currentUid={authUser.uid} />}
      {showAccountModal && <AccountModal onClose={()=>setShowAccountModal(false)} authUser={authUser} userProfile={userProfile} onDeleteAccount={()=>setShowAccountModal(false)} />}
      {showRatesModal && isAdmin && <RatesModal onClose={()=>setShowRatesModal(false)} currentRates={currentRates} onSaved={r=>setCurrentRates(r)} />}

      {/* ヘッダー */}
      <div style={{ background:`linear-gradient(135deg,#1A3A5C 0%,${accentColor} 100%)`, color:'#fff', padding:'16px 16px 10px', position:'sticky', top:0, zIndex:10, boxShadow:'0 2px 8px rgba(0,0,0,0.18)' }}>
        <div style={{ display:'flex', alignItems:'center', marginBottom:8 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, opacity:0.75, letterSpacing:1 }}>アートセッティングデリバリー（ASC）</div>
            <div style={{ fontSize:18, fontWeight:700 }}>売上記録アプリ</div>
          </div>
          <div style={{ display:'flex', gap:6 }}>
            {isAdmin && (
              <button onClick={()=>setShowStaffModal(true)} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
                👥
              </button>
            )}
            {isAdmin && (
              <button onClick={()=>setShowRatesModal(true)} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
                💴
              </button>
            )}
            <button onClick={()=>setShowAccountModal(true)} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
              ⚙️
            </button>
            <button onClick={handleLogout} style={{ background:'rgba(255,255,255,0.18)', border:'none', color:'#fff', borderRadius:8, padding:'6px 10px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
              ログアウト
            </button>
          </div>
        </div>

        {/* ログインユーザー表示 */}
        <div style={{ fontSize:11, opacity:0.8, marginBottom:8 }}>
          👤 {userProfile.name}　
          <span style={{ background: isAdmin?'rgba(255,215,0,0.3)':'rgba(255,255,255,0.15)', borderRadius:4, padding:'1px 6px', fontSize:10 }}>
            {isAdmin ? '👑 管理者' : 'スタッフ'}
          </span>
        </div>

        {/* スタッフ選択（管理者のみ） */}
        {isAdmin && allStaff.length > 1 && (
          <div style={{ display:'flex', gap:6, overflowX:'auto', paddingBottom:4, marginBottom:8, scrollbarWidth:'none' }}>
            {allStaff.map((s,idx)=>(
              <button key={s.uid} onClick={()=>setCurrentStaffId(s.uid)} style={{
                flexShrink:0, padding:'5px 12px', borderRadius:20, border:'2px solid',
                borderColor: currentStaffId===s.uid?'#fff':'rgba(255,255,255,0.35)',
                background:  currentStaffId===s.uid?'#fff':'rgba(255,255,255,0.12)',
                color:       currentStaffId===s.uid?staffColor(idx):'#fff',
                fontWeight:  currentStaffId===s.uid?700:400,
                fontSize:13, cursor:'pointer', whiteSpace:'nowrap',
              }}>{s.name}</button>
            ))}
          </div>
        )}

        {/* タブ */}
        <div style={{ display:'flex', gap:6 }}>
          {tabs.map(([v,label])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              flex:1, padding:'6px 0', borderRadius:8, border:'none',
              background: view===v?'#fff':'rgba(255,255,255,0.18)',
              color:      view===v?'#1A3A5C':'#fff',
              fontWeight: view===v?700:400, fontSize:12, cursor:'pointer',
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* データローディング */}
      {dataLoading && (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:40 }}>
          <div className="spinner"/>
        </div>
      )}

      {/* ─── 日次入力 ─── */}
      {!dataLoading && view==='input' && (
        <div style={{ padding:'14px 12px 0' }}>
          {/* スタッフバッジ */}
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, padding:'8px 12px', background:'#fff', borderRadius:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)', borderLeft:`4px solid ${accentColor}` }}>
            <div style={{ width:10, height:10, borderRadius:'50%', background:accentColor }}/>
            <span style={{ fontWeight:700, fontSize:15, color:accentColor }}>{currentStaffObj?.name}</span>
            <span style={{ fontSize:12, color:'#888', marginLeft:4 }}>の記録</span>
          </div>

          {/* 日付選択 */}
          <div style={{ background:'#fff', borderRadius:12, padding:'12px 14px', marginBottom:12, display:'flex', alignItems:'center', gap:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)' }}>
            <span style={{ fontSize:15 }}>📅</span>
            <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
              style={{ border:'none', fontSize:16, fontWeight:600, color:'#1A3A5C', background:'transparent', flex:1, outline:'none' }}/>
            {records[currentStaffId]?.[selectedDate] && (
              <span style={{ fontSize:11, background:'#E8F5E9', color:'#388E3C', borderRadius:6, padding:'2px 8px', fontWeight:600 }}>保存済</span>
            )}
          </div>

          {/* サイズ表 */}
          <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
            <div style={{ display:'grid', gridTemplateColumns:'52px 1fr 1fr 1fr', background:'#1A3A5C', color:'#fff', padding:'8px 10px', fontSize:12, fontWeight:600, gap:6, textAlign:'center' }}>
              <div>サイズ</div>
              <div>配達<br/><span style={{ fontWeight:400, opacity:0.8, fontSize:10 }}>件数</span></div>
              <div>集荷<br/><span style={{ fontWeight:400, opacity:0.8, fontSize:10 }}>件数</span></div>
              <div>小計</div>
            </div>
            {SIZES.map((size,i)=>{
              const R=getRates(); const d=parseInt(entry[size]?.delivery)||0, p=parseInt(entry[size]?.pickup)||0;
              const sub=d*R[size].delivery+p*R[size].pickup;
              return (
                <div key={size} style={{ display:'grid', gridTemplateColumns:'52px 1fr 1fr 1fr', alignItems:'center', gap:6, padding:'8px 10px', background:i%2===0?'#fff':'#F8FAFC', borderBottom:'1px solid #EEF1F5' }}>
                  <div style={{ fontWeight:700, fontSize:18, color:'#1A3A5C', textAlign:'center' }}>{size}</div>
                  <input type="number" inputMode="numeric" min="0" placeholder="0"
                    value={entry[size]?.delivery??''} onChange={e=>handleChange(size,'delivery',e.target.value)}
                    tabIndex={i+1} style={{ ...inputStyle, background:'#F5F8FF' }}/>
                  <input type="number" inputMode="numeric" min="0" placeholder="0"
                    value={entry[size]?.pickup??''} onChange={e=>handleChange(size,'pickup',e.target.value)}
                    tabIndex={SIZES.length+i+1} style={{ ...inputStyle, background:'#FFF8F5' }}/>
                  <div style={{ textAlign:'right', fontSize:13, fontWeight:600, color:sub>0?accentColor:'#BCC3CF', paddingRight:2 }}>
                    {sub>0?`¥${fmt(sub)}`:'—'}
                  </div>
                </div>
              );
            })}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 14px', background:'#EEF4FF', borderTop:'1.5px solid #C7D9F5' }}>
              <span style={{ fontSize:12, color:'#5577AA', fontWeight:600 }}>基本料金 小計</span>
              <span style={{ fontSize:15, fontWeight:700, color:accentColor }}>¥{fmt(baseTotal)}</span>
            </div>
          </div>

          {/* オプション */}
          <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
            <div style={{ background:'#5B4FCF', color:'#fff', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontWeight:700, fontSize:13 }}>⭐ オプション料金</span>
              <button onClick={addOption} style={{ background:'rgba(255,255,255,0.22)', border:'none', color:'#fff', borderRadius:8, padding:'5px 12px', fontSize:13, fontWeight:700, cursor:'pointer' }}>＋ 追加</button>
            </div>
            {(entry.options||[]).length===0 ? (
              <div style={{ padding:'18px 14px', textAlign:'center', color:'#AAB0BC', fontSize:13 }}>「＋ 追加」でオプション料金を記録できます</div>
            ) : (
              <div>
                {(entry.options||[]).map((opt,idx)=>(
                  <div key={idx} style={{ padding:'10px 12px', borderBottom:'1px solid #EEF1F5', background:idx%2===0?'#fff':'#F8FAFC' }}>
                    <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                      <input type="text" placeholder="内容（例：階段割増）" value={opt.label}
                        onChange={e=>updateOption(idx,'label',e.target.value)}
                        style={{ flex:1, padding:'8px 10px', fontSize:14, border:'1.5px solid #D0D7E3', borderRadius:8, outline:'none', color:'#1A3A5C', background:'#FAFAFF', boxSizing:'border-box' }}/>
                      <div style={{ display:'flex', alignItems:'center', gap:2 }}>
                        <span style={{ fontSize:14, color:'#666' }}>¥</span>
                        <input type="number" inputMode="numeric" placeholder="0" value={opt.amount}
                          onChange={e=>updateOption(idx,'amount',e.target.value)}
                          style={{ width:90, padding:'8px 6px', fontSize:16, textAlign:'right', border:'1.5px solid #D0D7E3', borderRadius:8, outline:'none', color:(parseInt(opt.amount)||0)<0?'#E05252':'#5B4FCF', fontWeight:700, background:'#FAF8FF', boxSizing:'border-box' }}/>
                      </div>
                      <button onClick={()=>removeOption(idx)} style={{ background:'none', border:'none', fontSize:18, color:'#CCC', cursor:'pointer', padding:'0 2px', lineHeight:1 }}>✕</button>
                    </div>
                  </div>
                ))}
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 14px', background:'#F3F0FF', borderTop:'1.5px solid #CFC8F5' }}>
                  <span style={{ fontSize:12, color:'#5B4FCF', fontWeight:600 }}>オプション 小計</span>
                  <span style={{ fontSize:15, fontWeight:700, color:optionTotal<0?'#E05252':'#5B4FCF' }}>¥{fmt(optionTotal)}</span>
                </div>
              </div>
            )}
          </div>

          {/* 合計 */}
          <div style={{ background:`linear-gradient(135deg,#1A3A5C,${accentColor})`, color:'#fff', borderRadius:12, padding:'14px 16px', marginBottom:14, boxShadow:`0 2px 8px rgba(37,99,168,0.25)` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:optionTotal!==0?8:0 }}>
              <div>
                <div style={{ fontSize:11, opacity:0.75 }}>本日合計（税別）</div>
                <div style={{ fontSize:11, opacity:0.6 }}>{selectedDate===today()?'今日':dateLabel(selectedDate)}</div>
              </div>
              <div style={{ fontSize:26, fontWeight:700 }}>¥{fmt(dayTotal)}</div>
            </div>
            {optionTotal!==0&&(
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, opacity:0.75, borderTop:'1px solid rgba(255,255,255,0.2)', paddingTop:6 }}>
                <span>基本 ¥{fmt(baseTotal)}</span>
                <span>オプション {optionTotal>=0?'+':''}¥{fmt(optionTotal)}</span>
              </div>
            )}
          </div>

          {/* 画像添付フォーム */}
          <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
            <div style={{ background:'#374151', color:'#fff', padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontWeight:700, fontSize:13 }}>📎 書類画像</span>
              {!imageData && (
                <label style={{ background:'rgba(255,255,255,0.22)', borderRadius:8, padding:'5px 12px', fontSize:13, fontWeight:700, cursor:'pointer', color:'#fff' }}>
                  {imageUploading ? '処理中...' : '＋ 画像を追加'}
                  <input type="file" accept="image/*" onChange={handleImageSelect} style={{ display:'none' }} disabled={imageUploading} />
                </label>
              )}
            </div>
            {imageData ? (
              <div style={{ padding:12 }}>
                <img src={imageData} alt="添付画像" style={{ width:'100%', borderRadius:8, display:'block', marginBottom:10 }} />
                <div style={{ display:'flex', gap:8 }}>
                  <label style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'10px', borderRadius:10, border:'1.5px solid #D0D7E3', background:'#F8FAFC', fontSize:13, fontWeight:600, color:'#555', cursor:'pointer' }}>
                    🔄 画像を変更
                    <input type="file" accept="image/*" onChange={handleImageSelect} style={{ display:'none' }} disabled={imageUploading} />
                  </label>
                  <button onClick={handleImageDelete} style={{ flex:1, padding:'10px', borderRadius:10, border:'1.5px solid #FCA5A5', background:'#fff', color:'#EF4444', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                    🗑️ 画像を削除
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ padding:'20px 14px', textAlign:'center', color:'#AAB0BC', fontSize:13 }}>
                {imageUploading ? (
                  <div><div className="spinner" style={{ margin:'0 auto 8px' }}/><div>圧縮・処理中...</div></div>
                ) : (
                  <div>
                    <div style={{ fontSize:32, marginBottom:8 }}>📷</div>
                    <div>「＋ 画像を追加」で書類の写真を添付できます</div>
                    <div style={{ fontSize:11, color:'#BCC3CF', marginTop:4 }}>自動で圧縮して保存されます</div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ボタン */}
          <div style={{ display:'flex', gap:10, marginBottom:10 }}>
            <button onClick={handleSave} disabled={!hasDayData||saving} style={{
              flex:1, padding:'14px', borderRadius:12, border:'none',
              background: hasDayData&&!saving?accentColor:'#BCC3CF', color:'#fff',
              fontSize:16, fontWeight:700, cursor:hasDayData&&!saving?'pointer':'not-allowed',
              boxShadow: hasDayData?`0 2px 8px ${accentColor}55`:'none',
            }}>{saving?'保存中...':saved?'✅ 保存済み':'💾 保存する'}</button>
            {records[currentStaffId]?.[selectedDate]&&(
              <button onClick={handleDelete} disabled={saving} style={{ padding:'14px 16px', borderRadius:12, border:'1.5px solid #EF4444', background:'#fff', color:'#EF4444', fontSize:14, fontWeight:600, cursor:'pointer' }}>🗑️</button>
            )}
          </div>

          {/* 単価表 */}
          <details style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
            <summary style={{ padding:'12px 14px', fontWeight:600, color:'#1A3A5C', cursor:'pointer', fontSize:13 }}>📋 単価表を確認する</summary>
            <div style={{ padding:'0 10px 10px' }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, textAlign:'center', fontSize:12 }}>
                {['サイズ','配達','集荷'].map(h=><div key={h} style={{ fontWeight:700, color:'#888', padding:'6px 0', borderBottom:'1px solid #eee' }}>{h}</div>)}
                {SIZES.map((s,i)=>[
                  <div key={s+'n'} style={{ padding:'5px 0', background:i%2?'#F8FAFC':'#fff', fontWeight:600 }}>{s}</div>,
                  <div key={s+'d'} style={{ padding:'5px 0', background:i%2?'#F8FAFC':'#fff', color:'#2563A8' }}>¥{fmt(getRates()[s].delivery)}</div>,
                  <div key={s+'p'} style={{ padding:'5px 0', background:i%2?'#F8FAFC':'#fff', color:'#E07B39' }}>¥{fmt(getRates()[s].pickup)}</div>,
                ])}
              </div>
            </div>
          </details>
        </div>
      )}

      {/* ─── 月次集計 ─── */}
      {!dataLoading && view==='month' && (
        <div style={{ padding:'14px 12px 0' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, padding:'8px 12px', background:'#fff', borderRadius:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)', borderLeft:`4px solid ${accentColor}` }}>
            <div style={{ width:10, height:10, borderRadius:'50%', background:accentColor }}/>
            <span style={{ fontWeight:700, fontSize:15, color:accentColor }}>{currentStaffObj?.name}</span>
            <span style={{ fontSize:12, color:'#888', marginLeft:4 }}>の月次集計</span>
          </div>
          <div style={{ background:'#fff', borderRadius:12, padding:'12px 14px', marginBottom:12, display:'flex', alignItems:'center', gap:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)' }}>
            <span style={{ fontSize:15 }}>📅</span>
            <input type="month" value={currentMonth} onChange={e=>setSelectedDate(e.target.value+'-01')}
              style={{ border:'none', fontSize:16, fontWeight:600, color:'#1A3A5C', background:'transparent', flex:1, outline:'none' }}/>
            <button onClick={()=>monthDays.length>0&&setPrintView(true)} disabled={monthDays.length===0}
              style={{ padding:'8px 12px', borderRadius:8, border:'none', background:monthDays.length>0?'#D97706':'#BCC3CF', color:'#fff', fontSize:13, fontWeight:700, cursor:monthDays.length>0?'pointer':'not-allowed', whiteSpace:'nowrap' }}>
              🖨️ 印刷
            </button>
          </div>
          <div style={{ background:`linear-gradient(135deg,#1A3A5C,${accentColor})`, color:'#fff', borderRadius:14, padding:'18px', marginBottom:14, boxShadow:'0 3px 12px rgba(37,99,168,0.28)' }}>
            <div style={{ fontSize:12, opacity:0.75, marginBottom:4 }}>{monthLabel(currentMonth)} 合計売上（税別）</div>
            <div style={{ fontSize:32, fontWeight:700, marginBottom:8 }}>¥{fmt(monthTotal)}</div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, opacity:0.8, borderTop:'1px solid rgba(255,255,255,0.2)', paddingTop:8 }}>
              <span>基本料金　¥{fmt(monthBaseTotal)}</span>
              <span>オプション　{monthOptionTotal>=0?'+':''}¥{fmt(monthOptionTotal)}</span>
            </div>
            <div style={{ fontSize:11, opacity:0.65, marginTop:4 }}>{monthDays.length}日分の記録</div>
          </div>
          {monthBreakdown.length>0&&(
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
              <div style={{ background:'#1A3A5C', color:'#fff', padding:'10px 14px', fontSize:13, fontWeight:700 }}>サイズ別集計</div>
              {monthBreakdown.map((r,i)=>(
                <div key={r.size} style={{ padding:'10px 14px', background:i%2?'#F8FAFC':'#fff', borderBottom:'1px solid #EEF1F5' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                    <span style={{ fontWeight:700, fontSize:16, color:'#1A3A5C' }}>サイズ {r.size}</span>
                    <span style={{ fontWeight:700, fontSize:15, color:accentColor }}>¥{fmt(r.da+r.pa)}</span>
                  </div>
                  <div style={{ display:'flex', gap:14, fontSize:12, color:'#666' }}>
                    {r.dc>0&&<span>🚚 配達 {r.dc}件 ¥{fmt(r.da)}</span>}
                    {r.pc>0&&<span>📦 集荷 {r.pc}件 ¥{fmt(r.pa)}</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
          {monthOptions.length>0&&(
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
              <div style={{ background:'#5B4FCF', color:'#fff', padding:'10px 14px', fontSize:13, fontWeight:700 }}>⭐ オプション明細</div>
              {monthOptions.map((o,i)=>(
                <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'9px 14px', background:i%2?'#F8FAFC':'#fff', borderBottom:'1px solid #EEF1F5' }}>
                  <div>
                    <div style={{ fontSize:13, color:'#1A3A5C' }}>{o.label||'（内容未記入）'}</div>
                    <div style={{ fontSize:11, color:'#AAB0BC' }}>{dateLabel(o.date)}</div>
                  </div>
                  <div style={{ fontWeight:700, color:o.amount<0?'#E05252':'#5B4FCF', fontSize:14 }}>{o.amount>=0?'+':''}¥{fmt(o.amount)}</div>
                </div>
              ))}
              <div style={{ display:'flex', justifyContent:'space-between', padding:'9px 14px', background:'#F3F0FF', borderTop:'1.5px solid #CFC8F5' }}>
                <span style={{ fontWeight:700, color:'#5B4FCF', fontSize:13 }}>オプション合計</span>
                <span style={{ fontWeight:700, color:monthOptionTotal<0?'#E05252':'#5B4FCF', fontSize:15 }}>{monthOptionTotal>=0?'+':''}¥{fmt(monthOptionTotal)}</span>
              </div>
            </div>
          )}
          {monthDays.length>0?(
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
              <div style={{ background:'#1A3A5C', color:'#fff', padding:'10px 14px', fontSize:13, fontWeight:700 }}>日別売上</div>
              {monthDays.map(([d,e],i)=>{
                const t=calcDayTotal(e), hasOpt=(e.options||[]).some(o=>parseInt(o.amount)||0);
                return (
                  <div key={d} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'11px 14px', background:i%2?'#F8FAFC':'#fff', borderBottom:'1px solid #EEF1F5', cursor:'pointer' }}
                    onClick={()=>{setSelectedDate(d);setView('input');}}>
                    <div>
                      <div style={{ fontWeight:600, fontSize:14, color:'#1A3A5C' }}>
                        {dateLabel(d)}
                        {hasOpt&&<span style={{ marginLeft:6, fontSize:10, background:'#EDE9FF', color:'#5B4FCF', borderRadius:4, padding:'1px 5px', fontWeight:600 }}>OP</span>}
                      </div>
                      <div style={{ fontSize:11, color:'#999', marginTop:1 }}>
                        {SIZES.filter(s=>(parseInt(e[s]?.delivery)||0)+(parseInt(e[s]?.pickup)||0)>0)
                          .map(s=>{const d2=parseInt(e[s]?.delivery)||0,p=parseInt(e[s]?.pickup)||0;return[d2>0&&`${s}配${d2}`,p>0&&`${s}集${p}`].filter(Boolean).join(' ');})
                          .filter(Boolean).join('　')}
                      </div>
                    </div>
                    <div style={{ textAlign:'right' }}>
                      <div style={{ fontWeight:700, color:accentColor, fontSize:15 }}>¥{fmt(t)}</div>
                      <div style={{ fontSize:10, color:'#aaa' }}>編集 ›</div>
                    </div>
                  </div>
                );
              })}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'13px 14px', background:'#EEF4FF', borderTop:'2px solid #2563A8' }}>
                <div style={{ fontWeight:700, color:'#1A3A5C' }}>月合計</div>
                <div style={{ fontWeight:800, fontSize:18, color:'#1A3A5C' }}>¥{fmt(monthTotal)}</div>
              </div>
            </div>
          ):(
            <div style={{ textAlign:'center', padding:'40px 20px', color:'#AAB0BC' }}>
              <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
              <div style={{ fontWeight:600 }}>この月の記録はまだありません</div>
              <div style={{ fontSize:13, marginTop:6 }}>「日次入力」タブから記録を追加しましょう</div>
            </div>
          )}
        </div>
      )}

      {/* ─── 全員集計（管理者のみ） ─── */}
      {!dataLoading && view==='all' && isAdmin && (
        <div style={{ padding:'14px 12px 0' }}>
          <div style={{ background:'#fff', borderRadius:12, padding:'12px 14px', marginBottom:12, display:'flex', alignItems:'center', gap:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)' }}>
            <span style={{ fontSize:15 }}>📅</span>
            <input type="month" value={currentMonth} onChange={e=>setSelectedDate(e.target.value+'-01')}
              style={{ border:'none', fontSize:16, fontWeight:600, color:'#1A3A5C', background:'transparent', flex:1, outline:'none' }}/>
          </div>
          <div style={{ background:'linear-gradient(135deg,#1A3A5C,#2563A8)', color:'#fff', borderRadius:14, padding:'18px', marginBottom:14, boxShadow:'0 3px 12px rgba(37,99,168,0.28)' }}>
            <div style={{ fontSize:12, opacity:0.75, marginBottom:4 }}>{monthLabel(currentMonth)} 全スタッフ合計（税別）</div>
            <div style={{ fontSize:32, fontWeight:700, marginBottom:4 }}>¥{fmt(grandTotal)}</div>
            <div style={{ fontSize:11, opacity:0.65 }}>{allStaff.length}名のスタッフ</div>
          </div>
          {allStaffMonthSummary.map((s,i)=>(
            <div key={s.uid} style={{ background:'#fff', borderRadius:12, padding:'14px', marginBottom:10, boxShadow:'0 1px 4px rgba(0,0,0,0.07)', borderLeft:`4px solid ${staffColor(s.idx)}`, cursor:'pointer' }}
              onClick={()=>{setCurrentStaffId(s.uid);setView('month');}}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:s.dayCount>0?8:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ width:10, height:10, borderRadius:'50%', background:staffColor(s.idx) }}/>
                  <span style={{ fontWeight:700, fontSize:16, color:'#1A3A5C' }}>{s.name}</span>
                  {s.dayCount>0&&<span style={{ fontSize:11, color:'#888' }}>{s.dayCount}日</span>}
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontWeight:800, fontSize:20, color:staffColor(s.idx) }}>
                    {s.total>0?`¥${fmt(s.total)}`:<span style={{ color:'#CCC', fontSize:15 }}>記録なし</span>}
                  </div>
                </div>
              </div>
              {s.dayCount>0&&(
                <div style={{ display:'flex', gap:14, fontSize:12, color:'#888', borderTop:'1px solid #EEF1F5', paddingTop:6 }}>
                  <span>基本 ¥{fmt(s.base)}</span>
                  {s.opt!==0&&<span>オプション {s.opt>=0?'+':''}¥{fmt(s.opt)}</span>}
                  <span style={{ marginLeft:'auto', color:'#aaa', fontSize:11 }}>詳細 ›</span>
                </div>
              )}
            </div>
          ))}
          {allStaffMonthSummary.some(s=>s.total>0)&&(
            <div style={{ background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)', marginBottom:12 }}>
              <div style={{ background:'#D97706', color:'#fff', padding:'10px 14px', fontSize:13, fontWeight:700 }}>🏆 今月のランキング</div>
              {[...allStaffMonthSummary].filter(s=>s.total>0).sort((a,b)=>b.total-a.total).map((s,rank)=>(
                <div key={s.uid} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', background:rank%2?'#F8FAFC':'#fff', borderBottom:'1px solid #EEF1F5' }}>
                  <div style={{ fontSize:rank===0?22:16, fontWeight:700, width:28, textAlign:'center' }}>
                    {rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':`${rank+1}`}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:700, fontSize:14, color:'#1A3A5C' }}>{s.name}</div>
                    <div style={{ fontSize:11, color:'#888' }}>{s.dayCount}日稼働</div>
                  </div>
                  <div style={{ fontWeight:800, fontSize:16, color:staffColor(s.idx) }}>¥{fmt(s.total)}</div>
                </div>
              ))}
            </div>
          )}
          {allStaffMonthSummary.every(s=>s.total===0)&&(
            <div style={{ textAlign:'center', padding:'40px 20px', color:'#AAB0BC' }}>
              <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
              <div style={{ fontWeight:600 }}>この月の記録はまだありません</div>
            </div>
          )}
        </div>
      )}

      <div style={{ height:20 }}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
